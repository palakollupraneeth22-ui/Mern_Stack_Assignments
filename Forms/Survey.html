<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Survey Form</title>
</head>
<body>
    
    <div style="width: fit-content; margin: 0 auto; padding-top: 5vh;">
        <h2>User Survey Form</h2>
        <form action="#" method="POST">
            
            <p>
                <label for="userName">User Name</label><br>
                <input type="text" id="userName" name="userName" placeholder="Enter your name" required autocomplete="name">
            </p>

            <p>
                <label for="feedback">Feedback</label><br>
                <textarea id="feedback" name="feedback" rows="4" cols="50" placeholder="Enter your feedback here..." required></textarea>
            </p>

            <fieldset style="border: none; padding: 0; margin: 0 0 1em 0;">
                <legend style="padding: 0; font-weight: normal;">Rating (1 - 5)</legend>
                <label><input type="radio" name="rating" value="1" required> 1</label>
                <label><input type="radio" name="rating" value="2" required> 2</label>
                <label><input type="radio" name="rating" value="3" required> 3</label>
                <label><input type="radio" name="rating" value="4" required> 4</label>
                <label><input type="radio" name="rating" value="5" required> 5</label>
            </fieldset>

            <p>
                <label for="favTech">Favorite Technology</label><br>
                <select id="favTech" name="favTech" required>
                    <option value="">Select a technology</option>
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Python">Python</option>
                </select>
            </p>

            <p>
                <label><input type="checkbox" name="subscribe" value="yes"> Subscribe to newsletter</label>
            </p>

            <p>
                <button type="submit">Submit Survey</button>
            </p>
            
        </form>
    </div>

</body>
</html>
