<!DOCTYPE html>
<html>
<head>
    <title>Service Request Form</title>
</head>
<body>
    <h2 align="center">Service Request Form</h2>
    <form align="center">
        <label for="customer">Customer Name:</label>
        <input type="text" id="customer" name="customer" placeholder="Enter your name" required><br><br>

        <label for="contact">Contact Number:</label>
        <input type="tel" id="contact" name="contact" placeholder="123-456-7890" required><br><br>

        <label for="issue">Issue Type:</label>
        <select id="issue" name="issue" required>
            <option value="">--Select--</option>
            <option value="Laptop Repair">Laptop Repair</option>
            <option value="Internet Issue">Internet Issue</option>
            <option value="Software Installation">Software Installation</option>
        </select><br><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="4" cols="40" placeholder="Describe your issue..." required></textarea><br><br>

        <label>Priority:</label>
        <input type="radio" name="priority" value="Low" required> Low
        <input type="radio" name="priority" value="Medium"> Medium
        <input type="radio" name="priority" value="High"> High<br><br>

        <input type="submit" value="Submit Request">
    </form>
</body>
</html>
