<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            color: #333;
        }
        .navbar {
            background: #007bff;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 0;
        }
        .navbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .btn-logout {
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn-logout:hover {
            background: #c82333;
        }
        .main-content {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .welcome-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .welcome-section h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }
        .welcome-section p {
            color: #666;
            font-size: 16px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .card p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .btn-primary {
            display: inline-block;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2>Student Portal Dashboard</h2>
        <div class="navbar-right">
            <span id="navUser"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="main-content">
        <div class="welcome-section">
            <h1 id="welcomeMsg">Checking session...</h1>
            <p>Welcome to your central dashboard. From here, you can manage applications, view results, and update settings.</p>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Profile Settings</h3>
                <p>Update your personal information and account preferences.</p>
                <a href="#" class="btn-primary" onclick="alert('Coming soon!')">Settings</a>
            </div>
        </div>
    </div>

    <script>
        const currentUser = localStorage.getItem('currentUser');

        // Security check: Redirect if no one is logged in
        if (!currentUser) {
            alert("Access Denied. Please login first.");
            window.location.href = "login.html";
        } else {
            document.getElementById('welcomeMsg').innerText = "Welcome back, " + currentUser + "!";
            document.getElementById('navUser').innerText = currentUser;
        }

        function logout() {
            localStorage.removeItem('currentUser'); // Clear active session
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
