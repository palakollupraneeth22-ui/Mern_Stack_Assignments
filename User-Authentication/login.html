<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
             display: flex; 
             justify-content: center; 
             align-items: center;
              height: 100vh;
               background: #f4f7f6;
                margin: 0;
             }
        .container { background: white;
             padding: 30px;
              border-radius: 12px;
               box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { color: #333; 
            margin-bottom: 20px;
         }
        input { 
            width: 100%;
             padding: 12px;
              margin: 10px 0; 
              border: 1px solid #ddd;
               border-radius: 6px;
             }
        button {
             width: 100%; 
             padding: 12px;
              background: #007bff;
               color: white; border: none; 
               border-radius: 6px; 
               cursor: pointer;
                font-size: 16px; 
            }
        button:hover { 
            background: #0056b3;
         }
        p {
             margin-top: 15px; 
             font-size: 14px;
              color: #666;
             }
        a {
             color: #28a745;
              text-decoration: none; 
            }
    </style>
</head>
<body>
    <div class="container">
        <h2>User Login</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="login()">Login</button>
        <p>Not registered? <a href="register.html">Register here</a></p>
    </div>

    <script>
        function login() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            const storedPass = localStorage.getItem(user);

            if (storedPass && storedPass === pass) {
                localStorage.setItem('currentUser', user); // Sets the session
                window.location.href = "home.html";
            } else {
                alert("Invalid Username or Password.");
            }
        }
    </script>
</body>
</html>
