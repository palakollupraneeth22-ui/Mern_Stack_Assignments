<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Tables Assignment</title>
</head>
<body>
    <table border="1" style="margin: 0 auto;">
        <caption style="font-weight:bold; margin-bottom:10px;">Weather Station</caption>
        <tr>
            <th rowspan="2">Station</th>
            <th colspan="2">Temperature</th>
            <th rowspan="2">Humidity</th>
            <th rowspan="2">Weather</th>
        </tr>
        <tr>
            <th>Max</th>
            <th>Min</th>
        </tr>
        <tr>
            <td>USA</td>
            <td align="center">24°C</td>
            <td align="center">19°C</td>
            <td align="center">60%</td>
            <td>Cloudy</td>
        </tr>
        <tr>
            <td>Germany</td>
            <td align="center">25°C</td>
            <td align="center">-1°C</td>
            <td align="center">70%</td>
            <td>Rainy</td>
        </tr>
    </table>
    
</body>
</html>
